name: "Build All ports"

on: [push]
env:
  CARGO_TERM_COLOR: always

jobs:
  build-x86:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
      - name: Update rustup
        run: rustup update && rustup target add x86_64-unknown-none && rustup +nightly component add rust-src
      - name: Install rust toolchain
        run: ./install_rust.sh
      - name: Build
        run: ./build_all.sh x86_64
      - name: Upload out/
        uses: actions/upload-artifact@v4.6.0
        with:
          name: out-x86_64
          path: out/
  build-aarch64:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
      - name: Update rustup
        run: rustup update && rustup default 1.88.0 && rustup target add aarch64-unknown-none && rustup +nightly component add rust-src
      - name: Install rust toolchain
        run: ./install_rust.sh
      - name: Build
        run: ./build_all.sh aarch64
      - name: Upload out/
        uses: actions/upload-artifact@v4.6.0
        with:
          name: out-aarch64
          path: out/
  release:
    needs: [build-x86, build-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download x86_64 out/
        uses: actions/download-artifact@v4
        with:
          name: out-x86_64
          path: out-x86_64/
      - name: Download aarch64 out/
        uses: actions/download-artifact@v4
        with:
          name: out-aarch64
          path: out-aarch64/
      - name: Archive artifacts
        run: |
          for dir in out-x86_64/ports/*; do
            name=$(basename "$dir")
            tar -czf "out-x86_64/${name}-x86_64.tar.gz" -C out-x86_64/ports "$name"
            rm -rf "$dir"
          done
          rm -rf out-x86_64/ports

          for dir in out-aarch64/ports/*; do
            name=$(basename "$dir")
            tar -czf "out-aarch64/${name}-aarch64.tar.gz" -C out-aarch64/ports "$name"
            rm -rf "$dir"
          done
          rm -rf out-aarch64/ports
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            out-x86_64/*
            out-aarch64/*
    if: startsWith(github.ref, 'refs/tags/')
